name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: env
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        env:
          EC2_ELASTIC_IP: ${{ secrets.EC2_ELASTIC_IP }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H $EC2_ELASTIC_IP >> ~/.ssh/known_hosts 2>/dev/null || true
          
          ssh -i ~/.ssh/ec2_key $EC2_USER@$EC2_ELASTIC_IP "cd ~/VideoGameLogger && git pull origin main && IGDB_CLIENT_ID=$IGDB_CLIENT_ID IGDB_CLIENT_SECRET=$IGDB_CLIENT_SECRET docker-compose down && IGDB_CLIENT_ID=$IGDB_CLIENT_ID IGDB_CLIENT_SECRET=$IGDB_CLIENT_SECRET docker-compose up -d --build && sleep 10 && echo 'Deployment complete'"
          
          rm ~/.ssh/ec2_key